include current-theme.conf

# window
hiden_window_decorations titlebar-only
window_padding_width 15
background_opacity 0.8
background_blur 30

# tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

cursor #ff7cd8
cursor_text_color #5d5d5d

# 開啟游標拖尾效果
cursor_trail 3
# 拖尾的衰減時間（秒），數值越小消失越快
cursor_trail_decay 0.1 0.4
# 觸發拖尾的最小距離（像素），防止微小移動也發光
cursor_trail_start_threshold 2



